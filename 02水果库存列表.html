<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水果库存静态页面</title>
    <link href="demo02-css.css" rel="stylesheet">
</head>
<body>
    <div id="container">
        <div id="fruitlist">
            <table id="f1">
                <tr>
                    <th class="w1">名称</th>
                    <th class="w1">单价</th>
                    <th class="w1">数量</th>
                    <th class="w1">小计</th>
                    <th class="w1">操作</th>
                </tr>
                <tr>
                    <td>苹果</td>
                    <td>5</td>
                    <td>20</td>
                    <td>100</td>
                    <td>删除</td>
                </tr>
                <tr>
                    <td>西瓜</td>
                    <td>3</td>
                    <td>20</td>
                    <td>60</td>
                    <td>保留</td>
                </tr>
                <tr>
                    <td>菠萝</td>
                    <td>4</td>
                    <td>25</td>
                    <td>100</td>
                    <td>删除</td>
                </tr>
                <tr>
                    <td>榴莲</td>
                    <td>3</td>
                    <td>30</td>
                    <td>90</td>
                    <td>保留</td>
                </tr>
                <tr>
                    <td>总计</td>
                    <td colspan="4">200</td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
