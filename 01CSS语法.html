<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS的语法</title>
    <link rel="stylesheet" href="demo-css.css">
    <!--内部样式表-->
    <!--ID样式表-->
    <style type="text/css">
            #i01{
            background-color: turquoise;
            font-size: 24px;
            color:brown;
        }


    </style>
</head>
<body>
    <p id="p2">段落1</p>
    <p id="i01">段落2</p>
    <!--嵌入式样式表-->
    <p style="color: cadetblue; font-weight: 100;">段落3</p>

    <div>
        <p class="f01">容器1</p>
    </div>
    

    <!--
    
    1.为什么需要cSS
    2.CSS的最基本的分类:标签样式表、类样式表、ID样式表
    3.CSS从位置上的分类:嵌入式样式表、内部样式表、外部样式表
    
    -->



    <!--盒子模型（简单了解）
    
    IE浏览器:实际尺寸=width
    chrome浏览器:实际尺寸=width+左右borderwidth+padding
    (不同浏览器的计算方式不同，所以不必详细了解)
    
    
    
    CSS盒子模型:
    1.border 边框
    2.margin 间距
    3.padding 填充

    -->
</body>
</html>
