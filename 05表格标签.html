        </tr>
        <tr align="center">
            <td>lwx</td>

        <tr align="center">
            <td>xym</td>

        <hr>

        <table border="10" width="500">
            <tr>
                <th>目的地</th>
                <th>提出人</th>
                <th>时间</th>
            </tr>

            <tr>
                <td>福建</td>
                <td>xym</td>
                <td>25年暑假</td>
            </tr>
            <tr>
                <td>重庆</td>
                <td rowspan="2">lyq</td>

            </tr>

            </tr>
            <tr>
                <td colspan="3">
                    总计
                </td>
            </tr>
        </table>

        <!--
        表格 table
        行 tr
        列 td
        表头列 th

        table中有如下属性(虽然已经淘汰，但是最好了解一下)
        -border:表格边框的粗细
        -width:表格的宽度
        -cellspacing:单元格间距
        -cellpadding:单元格填充
        
        tr中有一个属性:align->center, left, right


        
        rowspan :行合并
        colspan :列合并


        -->
    </table>
</body>
</html>
